app:
  aws:
    region: ${APP_AWS_REGION}
    dbSecretName: ${APP_AWS_DB_SECRET_NAME}
    dynamoTableName: ${APP_AWS_DYNAMO_TABLE_NAME}
    orderQueueUrl: ${APP_AWS_ORDER_QUEUE_URL}
    productsImagesBucketName: ${APP_AWS_PRODUCTS_IMAGES_BUCKET_NAME}
    env: ${APP_AWS_ENV}
    cognitoUserPoolId: ${APP_AWS_COGNITO_USER_POOL_ID}
    cognitoClientId: ${APP_AWS_COGNITO_CLIENT_ID}

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect